services:
  postgres:
    image: postgres:15-alpine
    container_name: topmentor-postgres
    environment:
      POSTGRES_USER: topmentor
      POSTGRES_PASSWORD: topmentor_dev
      POSTGRES_DB: topmentor
    ports:
      - "5432:5432"
    volumes:
      - topmentor_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U topmentor -d topmentor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: topmentor-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  topmentor_pg_data:

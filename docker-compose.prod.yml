services:
  postgres:
    image: postgres:15-alpine
    container_name: topmentor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-topmentor}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-topmentor}
    volumes:
      - topmentor_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-topmentor} -d ${DB_NAME:-topmentor}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: topmentor-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - topmentor_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: topmentor-migrate
    restart: "no"
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_ADDR: redis:6379
    command: ["/app/migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: topmentor-api
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: production
      DB_HOST: postgres
      REDIS_ADDR: redis:6379
      UPLOAD_DIR: /data/uploads
    volumes:
      - topmentor_uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: topmentor-caddy
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-toppeertalk.com}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-admin.toppeertalk.com}
      ACME_EMAIL: ${ACME_EMAIL:-admin@toppeertalk.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web/dist:/srv/web:ro
      - ./admin/dist:/srv/admin:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  topmentor_pg_data:
  topmentor_redis_data:
  topmentor_uploads:
  caddy_data:
  caddy_config:
